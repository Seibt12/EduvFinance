services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edufinance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:5432"   # DBeaver conecta em localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema executado automaticamente na primeira inicialização
      - ./database/edufinance.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── PHP + Apache ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edufinance-app
    restart: unless-stopped
    ports:
      - "8080:80"           # Acesse: http://localhost:8080
    volumes:
      - .:/var/www/html     # Hot-reload: edições refletem imediatamente
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres     # nome do serviço Docker (resolução interna)
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

volumes:
  postgres_data:
    name: edufinance_pgdata
